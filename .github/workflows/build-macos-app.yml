name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-14   # Apple Silicon (M1/M2/M3/M4)
            arch: arm64
          - runner: macos-13   # Intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app
        run: pyinstaller --windowed --noconfirm --name "BDM Dialer" app.py

      - name: Zip app bundle
        run: |
          cd dist
          zip -r "BDM-Dialer-macOS-${{ matrix.arch }}.zip" "BDM Dialer.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BDM-Dialer-macOS-${{ matrix.arch }}
          path: dist/BDM-Dialer-macOS-${{ matrix.arch }}.zip
